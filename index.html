<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="OCHE">
<meta name="theme-color" content="#0b1510">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>OCHE — Dart Scorebord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#0b1510; --bg1:#12201a; --bg2:#1a2c23; --bg3:#243a2f;
  --numkey:#162420; --card-dark:#101c16;
  --brass:#e8b04b; --brass-hi:#f0bd5e; --brass-rgb:232,176,75;
  --chalk:#f4ecd8; --green:#1f9e57; --green-hi:#28b566;
  --red:#d23b3b; --txt2:#a9b8ad; --dim:#6b7d72;
  --gold-border:rgba(var(--brass-rgb),.25);
  --ink-gold:#1a1206; --ink-green:#04140b;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;background:var(--bg0);}
body{
  font-family:'Archivo',system-ui,-apple-system,sans-serif;
  background:var(--bg0); color:var(--chalk);
  overflow:hidden;
  height:100%;
  user-select:none; -webkit-user-select:none;
}
#app{background:var(--bg0);}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input{font-family:inherit;}

@keyframes glowPulse{0%,100%{box-shadow:0 0 0 1.5px var(--brass),0 0 8px rgba(var(--brass-rgb),.10)}50%{box-shadow:0 0 0 1.5px var(--brass),0 0 16px rgba(var(--brass-rgb),.22)}}
@keyframes winIn{0%{opacity:0;transform:scale(.82)}100%{opacity:1;transform:scale(1)}}
@keyframes bustDrop{0%{transform:translateY(-130%);opacity:0}60%{transform:translateY(6%)}100%{transform:translateY(0);opacity:1}}
@keyframes sheetUp{0%{transform:translateY(100%)}100%{transform:translateY(0)}}
@keyframes thinkPulse{0%,100%{opacity:.35;transform:scale(.86)}50%{opacity:1;transform:scale(1)}}
@keyframes rays{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ===== App shell ===== */
#app{position:relative;height:100%;display:flex;flex-direction:column;max-width:520px;margin:0 auto;}
.screens{position:relative;flex:1 1 auto;min-height:0;overflow:hidden;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;animation:fadeIn .25s ease;}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 120px;
  padding-top:calc(var(--safe-top) + 12px);}
#screen-spel .scroll,#screen-modus .scroll{padding-bottom:calc(150px + var(--safe-bottom));}

/* header / logo */
.logo{padding:14px 0 12px;text-align:center;}
.logo .brand{font-weight:800;letter-spacing:5px;color:var(--brass);font-size:20px;}
.logo .sub{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;font-weight:700;margin-top:2px;}
.logo .divider{margin:10px auto 0;width:140px;border-top:1px dashed var(--gold-border);}

h1.title{font-size:22px;font-weight:800;margin:6px 0 16px;}
.caps{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);margin:18px 0 10px;}

/* buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border-radius:16px;
  font-weight:800;font-size:16px;padding:16px;width:100%;transition:transform .08s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(180deg,var(--brass-hi),var(--brass));color:var(--ink-gold);
  box-shadow:0 10px 26px rgba(var(--brass-rgb),.30);}
.btn-green{background:linear-gradient(180deg,var(--green-hi),var(--green));color:var(--ink-green);
  box-shadow:0 10px 24px rgba(31,158,87,.30);}
.btn-secondary{background:var(--bg2);color:var(--chalk);border:1px solid var(--gold-border);font-size:15px;}
.btn-ghost{background:transparent;color:var(--txt2);border:1px dashed rgba(169,184,173,.4);font-size:15px;}
.btn-danger{background:rgba(210,59,59,.13);color:var(--red);font-size:15px;}
.btn:disabled{background:var(--bg2);color:#5d6b62;opacity:.5;box-shadow:none;}

/* segmented */
.seg{display:flex;background:var(--bg0);border-radius:12px;padding:4px;gap:4px;}
.seg button{flex:1;padding:11px;border-radius:9px;font-weight:700;font-size:14px;color:var(--txt2);}
.seg button.on{background:var(--brass);color:var(--ink-gold);}

/* pills */
.pillrow{display:flex;gap:10px;}
.pill{flex:1;padding:13px;border-radius:14px;background:var(--bg2);text-align:center;
  font-weight:700;font-size:15px;color:var(--txt2);border:1px solid transparent;}
.pill.on{border-color:var(--brass);color:var(--brass);background:var(--bg3);}

/* dropdown */
.field{background:var(--bg2);border-radius:14px;padding:12px 14px;display:flex;flex-direction:column;gap:3px;}
.field label{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.field select{background:transparent;border:none;color:var(--chalk);font-weight:700;font-size:15px;outline:none;}

/* stepper */
.stepper{background:var(--bg2);border-radius:14px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;}
.stepper .lab{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.stepper .ctrl{display:flex;align-items:center;gap:14px;}
.stepper .ctrl button{font-size:22px;font-weight:800;width:28px;height:28px;}
.stepper .ctrl .minus{color:var(--dim);}
.stepper .ctrl .plus{color:var(--brass);}
.stepper .ctrl .val{font-weight:800;font-size:17px;min-width:20px;text-align:center;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* player rows in setup */
.prow{display:flex;align-items:center;gap:12px;background:var(--card-dark);border-radius:14px;padding:11px 13px;margin-bottom:8px;}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--bg3),var(--bg2));
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;
  border:1px solid var(--gold-border);}
.avatar.bot{font-size:20px;}
.prow .info{flex:1;min-width:0;}
.prow .nm{font-weight:700;font-size:15px;}
.prow .meta{font-size:11px;color:var(--txt2);margin-top:1px;}
.prow .meta.brass{color:var(--brass);}
.prow .rm{color:var(--dim);font-size:20px;padding:4px 8px;}
.prow.sel{border:1px solid var(--gold-border);}

.inputrow{display:flex;gap:10px;margin-top:4px;align-items:center;}
.inputrow input{flex:1;background:var(--bg2);border:1px solid var(--gold-border);border-radius:14px;
  padding:13px 14px;color:var(--chalk);font-size:15px;outline:none;}
.addbtn{width:46px;height:46px;border-radius:50%;background:linear-gradient(180deg,var(--brass-hi),var(--brass));
  color:var(--ink-gold);font-size:24px;font-weight:800;flex-shrink:0;display:flex;align-items:center;justify-content:center;}

/* radio cards (variant) */
.rcard{display:flex;align-items:center;gap:12px;background:var(--card-dark);border-radius:14px;padding:14px;margin-bottom:8px;border:1px solid transparent;}
.rcard.on{border-color:var(--brass);}
.radio{width:22px;height:22px;border-radius:50%;border:2px solid var(--dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.rcard.on .radio{border-color:var(--brass);}
.rcard.on .radio::after{content:'';width:11px;height:11px;border-radius:50%;background:var(--brass);}
.rcard .t{font-weight:700;font-size:15px;}
.rcard .d{font-size:12px;color:var(--txt2);margin-top:2px;}

/* mode cards */
.modegrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modecard{background:var(--card-dark);border-radius:16px;padding:15px;border:1px solid transparent;}
.modecard.on{border-color:var(--brass);background:linear-gradient(160deg,rgba(var(--brass-rgb),.07),var(--card-dark));}
.modecard .ic{color:var(--brass);height:26px;}
.modecard{position:relative;}
.modecard .pro{position:absolute;top:12px;right:12px;font-size:9px;font-weight:800;letter-spacing:1px;color:var(--ink-gold);background:var(--brass);padding:2px 7px;border-radius:8px;}
.modecard .pro.locked{background:var(--bg3);color:var(--brass);}
.modecard .t{font-weight:800;font-size:15px;margin-top:8px;}
.modecard .d{font-size:11px;color:var(--txt2);margin-top:4px;line-height:1.35;}

/* sticky bottom action */
.sticky-action{position:absolute;left:0;right:0;bottom:0;padding:18px 20px 14px;z-index:40;
  background:linear-gradient(180deg,transparent,var(--bg0) 38%);pointer-events:none;}
.sticky-action .btn{pointer-events:auto;}

/* toggle */
.toggle{width:48px;height:28px;border-radius:16px;background:var(--bg3);position:relative;flex-shrink:0;transition:background .2s;}
.toggle.on{background:var(--green);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:var(--dim);transition:transform .2s,background .2s;}
.toggle.on::after{transform:translateX(20px);background:var(--chalk);}

/* settings rows */
.setrow{display:flex;align-items:center;justify-content:space-between;background:var(--bg1);border-radius:14px;padding:14px 15px;margin-bottom:8px;gap:12px;}
.setrow .l{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;}
.setcard{background:var(--bg1);border-radius:14px;padding:6px 4px;margin-bottom:4px;}
/* grouped inset list (iOS-style) */
.group{background:var(--bg1);border-radius:16px;overflow:hidden;margin-bottom:6px;border:1px solid rgba(255,255,255,.04);}
.group .setrow{background:transparent;border-radius:0;margin:0;padding:15px 16px;border-top:1px solid rgba(255,255,255,.05);}
.group .setrow:first-child{border-top:none;}

/* stat strip (players tab) */
.statstrip{display:flex;gap:14px;font-size:11px;color:var(--txt2);margin-top:3px;}
.statstrip b{color:var(--chalk);}
.chev{color:var(--dim);font-size:20px;}

/* swipe-to-delete */
.swipe{position:relative;overflow:hidden;border-radius:14px;margin-bottom:8px;}
.swipe-del{position:absolute;top:0;right:0;height:100%;width:96px;background:var(--red);color:#fff;
  font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:14px;letter-spacing:.5px;}
.swipe-row{position:relative;z-index:1;touch-action:pan-y;will-change:transform;}
.swipe .prow{margin-bottom:0;}

/* ===== GAME SCREEN ===== */
#game{background:radial-gradient(120% 80% at 50% 0%,#15271d,#0b1510);}
.gamewrap{flex:1;display:flex;flex-direction:column;padding:calc(var(--safe-top) + 8px) 14px calc(8px + var(--safe-bottom));overflow:hidden;}
#game-body > div{flex:1;display:flex;flex-direction:column;min-height:0;}
.inpzone{margin-top:auto;}
#game-body .bigcard{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;}
#game-body .bigcard .big{margin:10px 0;}
.ctrlbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;}
.ctrlbar .gl{font-weight:800;font-size:15px;line-height:1.1;}
.ctrlbar .gl .gs{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase;display:block;margin-top:2px;}
.ctrlbar .right{display:flex;align-items:center;gap:8px;}
.autopill{display:flex;align-items:center;gap:6px;background:var(--bg2);border-radius:20px;padding:6px 10px;font-size:11px;font-weight:700;}
.autopill .mini{width:30px;height:18px;border-radius:10px;background:var(--bg3);position:relative;}
.autopill .mini.on{background:var(--green);}
.autopill .mini::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--dim);transition:transform .2s;}
.autopill .mini.on::after{transform:translateX(12px);background:var(--chalk);}
.settcirc{width:34px;height:34px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:16px;}
.stoppill{background:rgba(210,59,59,.13);color:var(--red);border-radius:20px;padding:8px 14px;font-weight:700;font-size:13px;}

/* player cards (x01) */
.pcards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.pcard{position:relative;background:var(--card-dark);border-radius:16px;padding:14px 12px 12px;text-align:center;border:1px solid transparent;}
.pcard.active{background:linear-gradient(160deg,#1a2c23,#12201a);border:1.5px solid var(--brass);animation:glowPulse 2.6s ease-in-out infinite;}
.pcard.dim{opacity:.85;}
.pcard .tag{position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--brass);color:var(--ink-gold);
  font-size:8px;font-weight:800;letter-spacing:1.5px;padding:3px 10px;border-radius:10px;text-transform:uppercase;white-space:nowrap;}
.pcard .ph{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px;}
.pcard .ph .av{width:26px;height:26px;font-size:11px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-weight:800;border:1px solid var(--gold-border);}
.pcard .ph .nm{font-weight:700;font-size:14px;}
.pcard .score{font-weight:900;font-size:52px;letter-spacing:-2px;line-height:1;color:var(--chalk);}
.pcard.dim .score{color:var(--txt2);}
.pips{display:flex;gap:6px;justify-content:center;margin:8px 0 6px;}
.pip{width:9px;height:9px;border-radius:50%;background:var(--bg3);}
.pip.on{background:var(--brass);}
.pip.green{background:var(--green);}
.pip.red{background:var(--red);}
.pcard .ft{font-size:10px;color:var(--dim);font-weight:700;letter-spacing:.5px;}
.pcard .last{font-size:10px;color:var(--txt2);margin-top:3px;}

/* checkout bar */
.cobar{background:rgba(var(--brass-rgb),.10);border:1px solid var(--gold-border);border-radius:12px;
  padding:9px 13px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cobar .l{font-size:11px;font-weight:800;color:var(--brass);letter-spacing:1px;}
.cobar .r{font-size:13px;font-weight:700;color:var(--chalk);}

/* dart slots */
.slots{display:flex;gap:8px;margin-bottom:10px;}
.slot{flex:1;background:var(--bg1);border:1.5px dashed var(--bg3);border-radius:12px;padding:12px 4px;text-align:center;
  font-weight:800;font-size:17px;color:var(--txt2);min-height:48px;display:flex;align-items:center;justify-content:center;}
.slot.filled{border-style:solid;border-color:var(--gold-border);color:var(--chalk);}
.slot.active{border-style:solid;border-color:var(--brass);color:var(--brass);}
.slot.total{background:var(--bg3);border:none;color:var(--green);flex:0 0 78px;flex-direction:column;gap:2px;}
.slot.total .tl{font-size:8px;letter-spacing:1.5px;color:var(--dim);font-weight:700;}
.slot.total .tv{font-size:18px;color:var(--green);font-weight:900;}

/* multiplier */
.mult{margin-bottom:8px;}

/* numpad */
.numpad{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:8px;}
.numpad button{background:var(--numkey);border-radius:11px;padding:13px 0;font-weight:800;font-size:17px;color:var(--chalk);border:1px solid transparent;transition:transform .06s,background .06s;}
.numpad button:active,.numpad button.tapped{background:linear-gradient(180deg,var(--brass-hi),var(--brass));color:var(--ink-gold);transform:scale(.94);}
.actions button.tapped{transform:scale(.94);filter:brightness(1.3);}

/* action row */
.actions{display:grid;grid-template-columns:1fr 1fr 1fr 1.4fr;gap:7px;}
.actions button{border-radius:12px;padding:14px 4px;font-weight:800;font-size:14px;}
.act-bull{background:var(--bg2);color:var(--brass);border:1px solid var(--gold-border);}
.act-miss{background:rgba(210,59,59,.13);color:var(--red);}
.act-undo{background:var(--bg2);color:var(--txt2);}
.act-next{background:linear-gradient(180deg,var(--brass-hi),var(--brass));color:var(--ink-gold);}
.act-next:disabled{background:var(--bg2);color:#5d6b62;opacity:.5;}

/* compact headers (cricket/shanghai) */
.cheaders{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.chead{background:var(--card-dark);border-radius:14px;padding:11px;text-align:center;border:1px solid transparent;}
.chead.active{border-color:var(--brass);animation:glowPulse 2.6s ease-in-out infinite;}
.chead .nm{font-weight:700;font-size:13px;}
.chead .sc{font-weight:900;font-size:30px;letter-spacing:-1px;margin-top:2px;}

/* cricket grid */
.crickwrap{flex:1;overflow-y:auto;margin-bottom:10px;}
.crickrow{display:grid;grid-template-columns:1fr 60px 1fr;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.crickrow .num{text-align:center;font-weight:900;font-size:20px;border-radius:8px;padding:6px 0;}
.crickrow .num.closed{background:rgba(31,158,87,.12);color:var(--green);}
.marks{display:flex;gap:5px;justify-content:center;font-size:18px;font-weight:800;min-height:22px;align-items:center;}
.marks.left{justify-content:flex-end;}
.marks.right{justify-content:flex-start;}
.mk{color:var(--chalk);}

/* big target card */
.bigcard{background:linear-gradient(160deg,#1a2c23,#101c16);border:1px solid var(--gold-border);border-radius:18px;
  padding:18px;text-align:center;margin-bottom:12px;}
.bigcard .lbl{font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--dim);text-transform:uppercase;}
.bigcard .big{font-weight:900;font-size:80px;letter-spacing:-3px;line-height:1;color:var(--brass);margin:6px 0;}
.bigcard .big.green{color:var(--green);}
.bigcard .hint{font-size:13px;color:var(--txt2);}
.bigcard .chips{display:flex;gap:8px;justify-content:center;margin-top:10px;}
.vchip{background:var(--bg2);border-radius:10px;padding:6px 12px;font-weight:800;font-size:13px;color:var(--chalk);}
.vchip b{color:var(--brass);}

/* active strip */
.astrip{display:flex;align-items:center;gap:10px;background:var(--card-dark);border:1px solid var(--gold-border);border-radius:14px;padding:10px 13px;margin-bottom:10px;}
.astrip .nm{font-weight:700;font-size:15px;}
.astrip .meta{font-size:10px;color:var(--brass);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
.astrip .rt{margin-left:auto;text-align:right;font-size:11px;color:var(--txt2);font-weight:700;}
.astrip .rt b{color:var(--chalk);font-size:14px;}

/* progress grid */
.pgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin-bottom:12px;}
.pcell{aspect-ratio:1;border-radius:7px;background:var(--bg1);display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--dim);border:1px solid transparent;}
.pcell.hit{background:var(--brass);color:var(--ink-gold);}
.pcell.green{background:var(--green);color:var(--ink-green);}
.pcell.red{background:rgba(210,59,59,.6);color:var(--chalk);}
.pcell.cur{border-color:var(--brass);color:var(--brass);}

.bigactions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.bigactions button{border-radius:14px;padding:18px;font-weight:800;font-size:17px;}
.bigact-miss{background:linear-gradient(180deg,#e05656,var(--red));color:#fff;}
.bigact-hit{background:linear-gradient(180deg,var(--green-hi),var(--green));color:var(--ink-green);}
.subactions{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.subactions button{border-radius:12px;padding:13px;font-weight:700;font-size:14px;background:var(--bg2);color:var(--txt2);}

/* shanghai banner */
.dashbanner{border:1px dashed var(--gold-border);border-radius:12px;padding:10px 13px;font-size:12px;color:var(--brass);text-align:center;margin-bottom:10px;font-weight:600;}

/* killer rows */
.killrow{display:flex;align-items:center;gap:11px;background:var(--card-dark);border-radius:14px;padding:12px 13px;margin-bottom:8px;border:1px solid transparent;}
.killrow.active{border-color:var(--brass);animation:glowPulse 2.6s ease-in-out infinite;}
.killrow.dead{opacity:.5;}
.killrow .info{flex:1;min-width:0;}
.killrow .nm{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px;}
.killrow.dead .nm{text-decoration:line-through;}
.killbadge{background:rgba(var(--brass-rgb),.15);color:var(--brass);font-size:9px;font-weight:800;padding:2px 7px;border-radius:8px;letter-spacing:1px;}
.killrow .sub{font-size:11px;color:var(--txt2);margin-top:2px;}
.killrow .sub.red{color:var(--red);}
.lives{display:flex;gap:5px;}
.life{width:11px;height:11px;border-radius:50%;background:var(--red);}
.life.lost{background:#3a4d42;}

/* bob tiles */
.darttiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.dtile{background:var(--bg1);border:1.5px dashed var(--bg3);border-radius:12px;padding:14px 4px;text-align:center;font-weight:800;font-size:16px;color:var(--txt2);min-height:52px;display:flex;align-items:center;justify-content:center;}
.dtile.hit{background:rgba(31,158,87,.15);border-style:solid;border-color:var(--green);color:var(--green);}
.dtile.miss{background:rgba(210,59,59,.13);border-style:solid;border-color:var(--red);color:var(--red);}

/* ===== bottom nav ===== */
.tabbar{display:flex;background:rgba(11,21,16,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(var(--brass-rgb),.12);padding-bottom:var(--safe-bottom);flex:none;z-index:50;}
.tabbar button{flex:1;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.tabbar .ti{display:flex;align-items:center;justify-content:center;color:var(--dim);}
.tabbar .tl{font-size:10px;font-weight:700;color:var(--dim);}
.tabbar button.on .ti{color:var(--brass);}
.ic-svg{display:inline-block;vertical-align:-3px;flex:none;}
.gl .ic-svg,.setrow .ic-svg,.btn .ic-svg,.sheet h2 .ic-svg{vertical-align:-3px;}
.setrow .l .ic-svg{color:var(--txt2);}
.tabbar button.on .tl{color:var(--brass);}

/* ===== overlays / sheets ===== */
.scrim{position:absolute;inset:0;background:rgba(4,10,7,.6);z-index:100;display:none;align-items:flex-end;max-width:520px;margin:0 auto;}
.scrim.show{display:flex;animation:fadeIn .2s ease;}
.sheet{background:var(--bg1);border-radius:26px 26px 0 0;width:100%;padding:8px 20px calc(24px + var(--safe-bottom));
  animation:sheetUp .5s cubic-bezier(.2,.8,.25,1);max-height:92%;overflow-y:auto;}
.handle{width:42px;height:5px;border-radius:3px;background:#3a4d42;margin:6px auto 16px;}
.sheet h2{font-size:19px;font-weight:800;display:flex;align-items:center;gap:10px;}
.sheet .sh-sub{font-size:13px;color:var(--txt2);margin:3px 0 16px;}

/* winner overlay */
#winner{position:absolute;inset:0;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(60% 50% at 50% 38%,#1a2c23,#0b1510);overflow:hidden;max-width:520px;margin:0 auto;}
#winner.show{display:flex;animation:fadeIn .3s ease;}
#winner .rays{position:absolute;top:30%;left:50%;width:700px;height:700px;transform:translate(-50%,-50%);

  animation:rays 30s linear infinite;border-radius:50%;}
#winner .inner{position:relative;text-align:center;animation:winIn .6s cubic-bezier(.2,.8,.25,1);padding:0 24px;}
#winner .wl{font-size:11px;font-weight:800;letter-spacing:4px;color:var(--brass);text-transform:uppercase;}
#winner .trophy{color:var(--brass);margin:10px 0;line-height:0;}
#winner .wav{width:78px;height:78px;border-radius:50%;background:var(--bg3);margin:0 auto 14px;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:28px;border:2.5px solid var(--brass);box-shadow:0 0 30px rgba(var(--brass-rgb),.4);}
#winner .wn{font-weight:900;font-size:42px;letter-spacing:-1.5px;}
#winner .ws{font-size:14px;color:var(--txt2);margin-top:6px;}
#winner .wchips{display:flex;gap:10px;justify-content:center;margin:22px 0;}
#winner .wchip{background:var(--bg1);border-radius:12px;padding:12px 14px;min-width:74px;}
#winner .wchip .v{font-weight:900;font-size:20px;}
#winner .wchip .k{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-top:2px;}
#winner .wchip.brass .v{color:var(--brass);}
#winner .wchip.green .v{color:var(--green);}
#winner .wbtns{width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px;}
#winner .wrow{display:flex;gap:10px;}
#winner .wrow .btn{font-size:14px;}

/* interstitial ad (free tier, after a full match) */
#adscreen{position:absolute;inset:0;z-index:300;display:none;flex-direction:column;
  background:radial-gradient(120% 80% at 50% 0%,#13241b 0%,var(--bg0) 70%);}
#adscreen.show{display:flex;animation:fadeIn .25s ease;}
#adscreen .adtop{display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-top) + 12px) 16px 10px;}
#adscreen .adlbl{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:var(--dim);border:1px solid rgba(var(--brass-rgb),.25);border-radius:6px;padding:4px 8px;}
#adscreen .adclose{width:40px;height:40px;border-radius:50%;border:1px solid rgba(var(--brass-rgb),.25);
  background:var(--bg1);color:var(--txt2);font-weight:800;font-size:15px;display:flex;align-items:center;
  justify-content:center;}
#adscreen .adclose:disabled{opacity:.6;}
#adscreen .adbody{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:0 28px;gap:6px;}
#adscreen .adbody .spark{color:var(--brass);line-height:0;margin-bottom:6px;}
#adscreen .adbody h3{font-size:30px;font-weight:900;letter-spacing:-1px;margin:0;}
#adscreen .adbody .adsub{color:var(--txt2);font-size:15px;max-width:300px;margin:2px 0 14px;line-height:1.5;}
#adscreen .adperks{font-size:14px;color:var(--txt2);line-height:2;text-align:left;}
#adscreen .adperks b{color:var(--chalk);font-weight:700;}
#adscreen .adfoot{padding:0 24px calc(var(--safe-bottom) + 22px);display:flex;flex-direction:column;gap:10px;}

/* tournament board */
#screen-tourney .scroll{padding:calc(var(--safe-top) + 10px) 16px calc(40px + var(--safe-bottom));}
.tchamp{text-align:center;background:linear-gradient(180deg,rgba(var(--brass-rgb),.16),var(--bg1));
  border:1px solid rgba(var(--brass-rgb),.3);border-radius:18px;padding:22px 16px;margin:14px 0 6px;}
.tchamp .trophy{color:var(--brass);line-height:0;}
.tchamp .wl{font-size:11px;font-weight:800;letter-spacing:3px;color:var(--brass);text-transform:uppercase;margin-top:8px;}
.tchamp .cn{font-size:30px;font-weight:900;letter-spacing:-1px;margin-top:2px;}
.tnextcard{background:var(--bg1);border:1px solid var(--gold-border);border-radius:16px;padding:16px;margin:14px 0 6px;text-align:center;}
.tnextcard .tnl{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}

.kowrap{display:flex;gap:14px;overflow-x:auto;padding:6px 2px 10px;-webkit-overflow-scrolling:touch;}
.kocol{display:flex;flex-direction:column;justify-content:space-around;gap:14px;min-width:140px;}

.rrtable{background:var(--bg1);border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden;}
.rrh,.rrr{display:flex;align-items:center;gap:10px;padding:10px 12px;font-size:14px;}

.rrr{border-top:1px solid rgba(255,255,255,.06);font-weight:600;}

.tfixrow{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--bg1);
  border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--txt2);}
.tfixrow.cur{border-color:var(--brass);}
.tfixrow.done{color:var(--chalk);}
.tfixrow .sc{font-variant-numeric:tabular-nums;color:var(--dim);font-weight:700;min-width:36px;text-align:center;}
.tfixrow .win{color:var(--brass);font-weight:800;}
.tfixrow span:first-child{flex:1;}

/* bust banner */
#bust{position:absolute;top:calc(var(--safe-top) + 14px);left:20px;right:20px;z-index:150;display:none;
  background:linear-gradient(180deg,#e05656,var(--red));border-radius:16px;padding:16px;text-align:center;
  box-shadow:0 16px 40px rgba(210,59,59,.4);max-width:480px;margin:0 auto;}
#bust.show{display:block;animation:bustDrop .5s cubic-bezier(.2,.9,.3,1.2);}
#bust .bt{font-weight:900;font-size:24px;letter-spacing:1px;color:#fff;}
#bust .bs{font-size:13px;color:rgba(255,255,255,.85);margin-top:2px;}

/* stat sheet bits */
.statcards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.statcard{background:var(--bg0);border-radius:14px;padding:13px 10px;text-align:center;}
.statcard .v{font-weight:900;font-size:24px;}
.statcard .k{font-size:9px;font-weight:700;letter-spacing:1.2px;color:var(--dim);text-transform:uppercase;margin-top:3px;}
.statcard.green .v{color:var(--green);}
.chartbox{background:var(--bg0);border-radius:14px;padding:14px;margin-bottom:12px;}
.chartbox .ct{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:10px;}
.bars{display:flex;align-items:flex-end;gap:8px;height:110px;}
.bars .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;}
.bars .bar .fill{width:100%;border-radius:6px 6px 0 0;background:var(--bg3);}
.bars .bar.green .fill{background:var(--green);}
.bars .bar.brass .fill{background:var(--brass);}
.bars .bar .bl{font-size:9px;color:var(--dim);font-weight:700;}
.dbar{margin-bottom:10px;}
.dbar .dl{display:flex;justify-content:space-between;font-size:11px;font-weight:700;margin-bottom:5px;}
.dbar .dl .pct{color:var(--brass);}
.dbar .track{height:8px;border-radius:4px;background:var(--bg0);overflow:hidden;}
.dbar .track .fl{height:100%;background:linear-gradient(90deg,var(--brass),var(--brass-hi));border-radius:4px;}

.killgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:6px 0 16px;}
.killgrid button{aspect-ratio:1;border-radius:12px;background:var(--bg2);font-weight:800;font-size:17px;color:var(--chalk);border:1px solid transparent;}
.killgrid button.occ{background:#0d1813;color:var(--dim);text-decoration:line-through;opacity:.6;}
.killgrid button.sel{background:linear-gradient(180deg,var(--brass-hi),var(--brass));color:var(--ink-gold);box-shadow:0 0 18px rgba(var(--brass-rgb),.45);}

.levelrow{display:flex;align-items:center;gap:12px;background:var(--card-dark);border-radius:14px;padding:14px;margin-bottom:8px;border:1px solid transparent;}
.levelrow.on{border-color:var(--brass);animation:glowPulse 2.6s ease-in-out infinite;}
.levelrow .t{font-weight:700;font-size:15px;}
.levelrow .d{font-size:12px;color:var(--txt2);margin-top:2px;}

.empty{text-align:center;color:var(--dim);font-size:13px;padding:30px 0;}
.toast{position:absolute;bottom:calc(90px + var(--safe-bottom));left:50%;transform:translateX(-50%);
  background:var(--bg2);border:1px solid var(--gold-border);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:700;
  z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>

 </div><!-- /.screens -->

<script>
"use strict";

/* ============ STATE ============ */
const DEFAULT_STATE = {
  setup:{ type:'x01', points:501, checkout:'double', checkIn:'straight', format:'firstTo', sets:1, legs:3,
    variant:'standard', mode:'atc', atcStart:1, atcEnd:20, atcBull:true, cuRounds:8, coAttempts:9, handicap:false, gotchaTarget:301,
    tourFormat:'ko', tourLegs:2, tourPoints:501, selectedPlayers:[1,2] },
  players:[
    {id:1,name:'Justin',initials:'JT',isBot:false,stats:{avg:61.4,games:128,wins:82,checkoutPct:38,dartsPerLeg:14.2,avgHistory:[45,52,58,60,46,65,68,72,65,68],scoreDist:{'26+':30,'41+':58,'60+':80,'100+':52,'140+':34,'180':18},doubles:{D20:44,D16:51,Bull:29}}},
    {id:2,name:'Sanne',initials:'SD',isBot:false,stats:{avg:54.8,games:96,wins:49,checkoutPct:32,dartsPerLeg:15.8,avgHistory:[40,48,52,55,50,58,54,60,56,58],scoreDist:{'26+':38,'41+':62,'60+':70,'100+':40,'140+':22,'180':9},doubles:{D20:36,D16:42,Bull:24}}},
    {id:3,name:'Milan',initials:'MV',isBot:false,stats:{avg:48.1,games:61,wins:26,checkoutPct:28,dartsPerLeg:17.2,avgHistory:[38,42,45,40,48,46,50,47,49,48],scoreDist:{'26+':44,'41+':58,'60+':60,'100+':30,'140+':14,'180':5},doubles:{D20:28,D16:33,Bull:18}}},
    {id:4,name:'Dart Robot',initials:'🤖',isBot:true,botLevel:'gevorderd',adaptive:true,stats:{avg:75,games:0,wins:0,checkoutPct:42,dartsPerLeg:13.5,avgHistory:[],scoreDist:{},doubles:{}}},
  ],
  settings:{ sound:true, voice:true, autoContinue:true, botStrength:'gevorderd', adaptive:true, vibrate:false, keepScreen:true, voiceCaller:'Russ Bray', theme:'oche', premium:false },
  history:[],
  tourney:null,
  nextId:5,
};
let STATE = load();
let GAME = null;
let activeTab = 'spel';

function load(){
  try{ const s = JSON.parse(localStorage.getItem('oche-state'));
    if(s&&s.players){ // fill in any new default keys added in later versions
      s.setup = Object.assign({}, DEFAULT_STATE.setup, s.setup);
      s.settings = Object.assign({}, DEFAULT_STATE.settings, s.settings);
      return s;
    }
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}
function save(){ try{ localStorage.setItem('oche-state', JSON.stringify(STATE)); }catch(e){} }

/* ============ helpers ============ */
const $ = s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1600); }
function getPlayer(id){ return STATE.players.find(p=>p.id===id); }
function initialsFor(name){ const parts=name.trim().split(/\s+/); if(parts.length===1) return parts[0].slice(0,2).toUpperCase(); return (parts[0][0]+parts[parts.length-1][0]).toUpperCase(); }
function vibrate(ms){ if(STATE.settings.vibrate && navigator.vibrate) navigator.vibrate(ms); }

/* ============ sound (Web Audio + speech, offline) ============ */
const Sound={
  ctx:null, unlocked:false,
  ac(){ if(!this.ctx){ try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return this.ctx; },
  on(){ return STATE.settings.sound; },
  unlock(){ if(this.unlocked) return; this.unlocked=true; const c=this.ac(); if(c&&c.state==='suspended') c.resume();
    if('speechSynthesis' in window){ try{ const u=new SpeechSynthesisUtterance(' '); u.volume=0; speechSynthesis.speak(u); }catch(e){} } },
  tone(freq,dur,type,vol,when){ const c=this.ac(); if(!c)return; const o=c.createOscillator(),g=c.createGain();
    o.type=type||'sine'; o.frequency.value=freq; const t=c.currentTime+(when||0);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.06,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.12)); o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+(dur||0.12)+0.02); },
  hit(){ if(!this.on())return; this.tone(680,0.06,'triangle',0.03); },
  bust(){ if(!this.on())return; this.tone(200,0.18,'sawtooth',0.09); this.tone(130,0.3,'sawtooth',0.09,0.12); this.say('Bust'); },
  finish(){ if(!this.on())return; [523,659,784,1047].forEach((f,i)=>this.tone(f,0.22,'triangle',0.07,i*0.11)); },
  oneeighty(){ if(!this.on())return; [784,784,1047,1319].forEach((f,i)=>this.tone(f,0.18,'square',0.06,i*0.1)); },
  say(text){ if(!this.on()||!('speechSynthesis' in window))return; try{ const u=new SpeechSynthesisUtterance(text);
    u.lang='en-GB'; u.rate=0.95; u.pitch=1; speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e){} },

function stepper(label,key,min,max){

function handicapStarts(){

/* ---- swipe-to-delete (left swipe reveals a red Verwijder button) ---- */
let swipeRows=[];
function closeAllSwipes(except){ swipeRows.forEach(r=>{ if(r!==except && r._close) r._close(); }); }
function makeSwipeRow(prow,onDelete){
  const wrap=el('div','swipe');
  const del=el('button','swipe-del','Verwijder');
  prow.classList.add('swipe-row');
  wrap.appendChild(del); wrap.appendChild(prow);
  let startX=0,startY=0,base=0,dragging=false,moved=false,horiz=null; prow._x=0;
  const setX=x=>{ prow._x=x; prow.style.transform='translateX('+x+'px)'; };
  prow._close=()=>{ prow.style.transition='transform .2s'; setX(0); };
  prow.addEventListener('touchstart',e=>{ const t=e.touches[0]; startX=t.clientX;startY=t.clientY;base=prow._x;dragging=true;moved=false;horiz=null; prow.style.transition='none'; closeAllSwipes(prow); },{passive:true});
  prow.addEventListener('touchmove',e=>{ if(!dragging)return; const t=e.touches[0]; const dx=t.clientX-startX,dy=t.clientY-startY;
    if(horiz===null){ if(Math.abs(dx)>6||Math.abs(dy)>6) horiz=Math.abs(dx)>Math.abs(dy); }
    if(!horiz)return; moved=true; setX(Math.min(0,Math.max(-100,base+dx))); },{passive:true});
  prow.addEventListener('touchend',()=>{ if(!dragging)return; dragging=false; prow.style.transition='transform .2s'; setX(prow._x<-50?-100:0); });
  del.addEventListener('click',e=>{ e.stopPropagation(); onDelete(); });
  const origClick=prow.onclick;
  prow.onclick=(ev)=>{ if(moved||prow._x<-4){ prow._close(); return; } if(origClick) origClick.call(prow,ev); };
  swipeRows.push(prow);
  return wrap;
}

}

function timeAgo(ts){
  const d=Math.floor((Date.now()-ts)/1000);

}

function checkoutRoute(score){
  if(score>170||score<2) return null;
  if(STATE.setup.checkout==='double'){ if(score===1) return null; }
  return CHECKOUTS[score]||null;
}
/* finishing sets for double-out */
const FIN_DBL=(()=>{ const s=new Set(); for(let n=1;n<=20;n++) s.add(2*n); s.add(50); return s; })(); // valid last-dart doubles + bull
function dblLabel(v){ return v===50?'Bull':'D'+(v/2); }
/* best checkout route that fits within `darts` darts left this turn; null if not finishable */
function bestRoute(r,darts){
  if(r<2||r>170) return null;
  if(FIN_DBL.has(r)) return dblLabel(r);            // 1 dart
  if(darts>=2){
    const firsts=[];
    for(let n=20;n>=1;n--) firsts.push(['S'+n,n]);
    firsts.push(['25',25]);
    for(let n=20;n>=1;n--) firsts.push(['T'+n,3*n]);
    firsts.push(['Bull',50]);
    for(const [lab,val] of firsts){ const rem=r-val; if(rem>=2 && FIN_DBL.has(rem)) return lab+' '+dblLabel(rem); }
  }
  if(darts>=3) return checkoutRoute(r);             // standard 3-dart route from the table
  return null;
}

/* ============ GAME ENGINE ============ */
function startGame(){
  const ids=STATE.setup.selectedPlayers.slice();
  if(ids.length<1){ toast('Kies minstens 1 speler'); return; }
  const type = activeTab==='spel' ? STATE.setup.type : STATE.setup.mode;
  if(activeTab==='modus' && modeLocked(type)){ openPremiumSheet(); return; }
  if(type==='tourney'){ startTourney(ids); return; }
  GAME={ type, players:ids.map(id=>({id,...freshPlayerGame(type)})), cur:0, darts:[], mult:1,
    history:[], setsTarget:STATE.setup.sets, legsTarget:STATE.setup.legs, auto:STATE.settings.autoContinue,
    round:1, finished:false, cuRounds:STATE.setup.cuRounds, coAttempts:STATE.setup.coAttempts };
  if(type==='x01'){ const hs=STATE.setup.handicap?handicapStarts():null;
    GAME.players.forEach(gp=>{ gp.startScore = hs?hs[gp.id]:STATE.setup.points; gp.score=gp.startScore; }); }
  if(type==='halveit') GAME.targets=HALVE_TARGETS;
  if(type==='bermuda') GAME.targets=BERMUDA_TARGETS;
  if(type==='doubles'){ GAME.trainSeq=DOUBLE_SEQ; GAME.trainMult=2; }
  if(type==='trebles'){ GAME.trainSeq=TREBLE_SEQ; GAME.trainMult=3; }
  if(type==='golf'){ GAME.holes=9; }
  if(type==='gotcha'){ GAME.target=STATE.setup.gotchaTarget; }
  if(type==='killer'){ GAME.pickIndex=0; renderGameScreen(); openKillerPick(); return; }
  if(type==='cotrain') setCheckoutTarget(GAME.players[0]);
  renderGameScreen();
}
function freshPlayerGame(type){
  const base={legsWon:0,setsWon:0,lastTurn:0,legStartDarts:0,dartsThrown:0,turnScores:[]};
  if(type==='x01') return {...base,score:STATE.setup.points,checkedIn:STATE.setup.checkIn==='straight'};

  if(type==='bob') return {...base,balance:27,target:1};
  if(type==='killer') return {...base,number:null,lives:3,isKiller:false,eliminated:false};
  if(type==='countup') return {...base,score:0};

}

function dartSlotsX01(){

function dartLabel(d){ if(d.v===0)return 'Miss'; if(d.v===25)return d.m===2?'Bull':'25'; const pre=d.m===3?'T':d.m===2?'D':''; return pre+d.v; }
function dartValue(d){ return d.noScore?0:d.v*d.m; }
function turnSum(){ return GAME.darts.reduce((a,d)=>a+dartValue(d),0); }

function x01Dart(v,m){
  const cur=curP();
  if(GAME.darts.length>=3) return;
  pushHistory();
  const isDouble = (m===2)||(v===25&&m===2);
  // double-in: until the player hits a double, darts don't score
  let noScore=false;
  if(STATE.setup.checkIn==='double' && !cur.checkedIn){ if(isDouble) cur.checkedIn=true; else noScore=true; }
  GAME.darts.push({v,m,noScore});
  const remaining=cur.score-turnSum();
  // bust / finish logic
  if(remaining<0 || remaining===1 && STATE.setup.checkout==='double' || (remaining===0 && STATE.setup.checkout==='double' && !isDouble)){
    bustTurn(); return;
  }
  if(remaining===0){ // win
    cur.dartsThrown += GAME.darts.length;
    recordTurn(cur);
    legWon(GAME.cur); return;
  }
  Sound.hit();
  if(GAME.darts.length>=3) Sound.scoreCall(turnSum());
  renderGameScreen();
  if(GAME.darts.length>=3 && GAME.auto && !curIsBot()) setTimeout(nextPlayer,450);
}
function bustTurn(){
  vibrate(120);
  const cur=curP();
  cur.dartsThrown += GAME.darts.length;
  showBust('Score blijft '+cur.score);
  GAME.darts=[];
  GAME.turnAdvancing=true;
  setTimeout(()=>{ nextPlayer(); },900);
}
function recordTurn(cur){ const t=turnSum(); cur.lastTurn=t; cur.turnScores.push(t); }
function commitX01Turn(){
  const cur=curP(); const sum=turnSum();
  cur.score-=sum; recordTurn(cur); cur.dartsThrown+=GAME.darts.length;
}

/* ---- next player / leg / set ---- */
function nextPlayer(){
  if(!GAME) return;               // game may have been stopped while a timer was pending
  hideBust();
  if(GAME.finished) return;
  GAME.turnAdvancing=false;
  const cur=curP();
  // commit turn for scoring modes that accumulate per turn
  if(GAME.type==='x01' && GAME.darts.length>0 && cur.score-turnSum()>1){ commitX01Turn(); }
  if(GAME.type==='gotcha' && GAME.darts.length>0){ gotchaCommit(); }
  if((GAME.type==='halveit'||GAME.type==='bermuda') && GAME.darts.length>0){ const sum=GAME.darts.reduce((a,d)=>a+(d.val||0),0); if(sum===0) cur.score=Math.floor(cur.score/2); else cur.score+=sum; cur.lastTurn=sum; }
  GAME.darts=[]; GAME.mult=1;
  GAME.cur=(GAME.cur+1)%GAME.players.length;
  // skip eliminated in killer
  if(GAME.type==='killer'){ let guard=0; while(curP().eliminated && guard<10){ GAME.cur=(GAME.cur+1)%GAME.players.length; guard++; } }
  // bob: end when everyone is done, otherwise skip players who already finished their doubles
  if(GAME.type==='bob'){ if(allBobDone()){ bobEnd(); return; } let guard=0; while(curP().target==null && guard<10){ GAME.cur=(GAME.cur+1)%GAME.players.length; guard++; } }
  if(GAME.cur===0) GAME.round++;
  // shanghai end after 20 rounds
  if(GAME.type==='shanghai' && GAME.round>20){ shanghaiEnd(); return; }
  if(GAME.type==='countup' && GAME.round>GAME.cuRounds){ highestWins(); return; }
  if((GAME.type==='halveit'||GAME.type==='bermuda') && GAME.round>GAME.targets.length){ highestWins(); return; }
  renderGameScreen();
}
function curIsBot(){ return getPlayer(curP().id).isBot; }
function curLegNo(){ return GAME.players.reduce((a,p)=>a+p.legsWon,0)+1; }

function legWon(idx){
  const p=GAME.players[idx]; p.legsWon++;
  const fmt=GAME.format||STATE.setup.format;
  const target = fmt==='firstTo'?GAME.legsTarget:Math.ceil((GAME.legsTarget+1)/2);
  if(p.legsWon>=target){ setWon(idx); return; }
  showWinner(idx,'leg');
}
function setWon(idx){
  const p=GAME.players[idx]; p.setsWon++;
  const target=STATE.setup.format==='firstTo'?GAME.setsTarget:Math.ceil((GAME.setsTarget+ (GAME.setsTarget%2?0:1))/1);
  if(p.setsWon>=GAME.setsTarget){ GAME.finished=true; recordGameStats(idx); showWinner(idx,'match'); }
  else { GAME.players.forEach(pp=>pp.legsWon=0); showWinner(idx,'set'); }
}

    grid+=`<div class="crickrow"><div class="marks left">${markStr(GAME.players[0].marks[n])}</div>
      <div class="num ${closedByAll?'closed':''}">${n===25?'BULL':n}</div>
      <div class="marks right">${GAME.players[1]?markStr(GAME.players[1].marks[n]):''}</div></div>`;
  });
  grid+='</div>';
  let keys='<div class="numpad" style="grid-template-columns:repeat(4,1fr)">';
  CRICK_NUMS.forEach(n=>keys+=`<button data-cnum="${n}">${n===25?'Bull':n}</button>`);

  return `<div>${ctrlBar('Cricket · '+vlabel,'LEG '+curLegNo())}${heads}${grid}${multSeg([['1','Single'],['2','Double'],['3','Triple']])}${keys}
    <div class="actions" style="grid-template-columns:1fr 1.4fr"><button class="act-undo" data-act="undo">${icon('undo',15)} Undo</button>
    <button class="act-next" data-act="next">Volgende</button></div></div>`;
}
function markStr(m){ if(m<=0)return ''; if(m===1)return '<span class="mk">╱</span>'; if(m===2)return '<span class="mk">✕</span>'; return '<span class="mk">⊗</span>'; }
function cricketHit(n,m){
  const cur=curP(); pushHistory();
  let hits=m;
  for(let i=0;i<m;i++){
    if(cur.marks[n]<3){ cur.marks[n]++; }
    else {
      // score on open number if others not closed
      const variant=STATE.setup.variant;
      if(variant!=='noscore'){
        const others=GAME.players.filter(p=>p!==cur);
        const openForOthers=others.some(p=>p.marks[n]<3);
        if(openForOthers){
          if(variant==='cutthroat'){ others.forEach(p=>{ if(p.marks[n]<3) p.points+=n===25?25:n; }); }
          else cur.points+=n===25?25:n;
        }
      }
    }
  }
  GAME.darts.push({v:n,m:1});
  // win check: all closed + highest points (standard)
  if(cricketWinCheck()) return;
  renderGameScreen();
  if(GAME.darts.length>=3 && GAME.auto && !curIsBot()) setTimeout(nextPlayer,450);
}
function cricketWinCheck(){
  const variant=STATE.setup.variant;
  for(let idx=0;idx<GAME.players.length;idx++){
    const p=GAME.players[idx];
    const allClosed=CRICK_NUMS.every(n=>p.marks[n]>=3);
    if(allClosed){
      if(variant==='noscore'){ legWon(idx); return true; }
      const best = variant==='cutthroat'
        ? GAME.players.every(o=>o===p||p.points<=o.points)
        : GAME.players.every(o=>o===p||p.points>=o.points);
      if(best){ legWon(idx); return true; }
    }
  }
  return false;
}

function killerHit(num){
  const cur=curP(); pushHistory();
  GAME.darts.push({v:num,m:GAME.mult});
  if(num===cur.number){
    if(!cur.isKiller && GAME.mult===2) cur.isKiller=true;
  } else if(cur.isKiller){
    const victim=GAME.players.find(p=>p.number===num && !p.eliminated);
    if(victim){ victim.lives-=GAME.mult; if(victim.lives<=0){ victim.lives=0; victim.eliminated=true; victim.isKiller=false; } }
  }
  const alive=GAME.players.filter(p=>!p.eliminated);
  if(alive.length===1){ legWon(GAME.players.indexOf(alive[0])); return; }
  if(GAME.darts.length>=3){ renderGameScreen(); if(GAME.auto&&!curIsBot()) setTimeout(nextPlayer,500); return; }
  renderGameScreen();
}
function openKillerPick(){
  const sh=$('#sheet'); const p=GAME.players[GAME.pickIndex]; const pl=getPlayer(p.id);
  const taken=GAME.players.map(x=>x.number).filter(n=>n);
  let sel=null;
  sh.innerHTML=`<div class="handle"></div>
    <h2><span class="avatar" style="width:34px;height:34px;font-size:13px">${avInit(pl,18)}</span> ${pl.name} kiest een nummer</h2>

    <div class="killgrid" id="kg"></div><button class="btn btn-primary" id="kconfirm" disabled>Kies een nummer</button>`;
  const kg=sh.querySelector('#kg');
  function draw(){ kg.innerHTML=''; for(let n=1;n<=20;n++){ const occ=taken.includes(n);
    const btn=el('button',(occ?'occ':'')+(sel===n?' sel':''),n); if(!occ) btn.onclick=()=>{sel=n;draw();sh.querySelector('#kconfirm').disabled=false;sh.querySelector('#kconfirm').textContent='Bevestig nummer '+n;}; kg.appendChild(btn); } }
  draw();
  // auto-pick for bot
  if(pl.isBot){ const free=[]; for(let n=1;n<=20;n++) if(!taken.includes(n)) free.push(n); sel=free[Math.floor(Math.random()*free.length)]; }
  sh.querySelector('#kconfirm').onclick=()=>{
    if(!sel) return; p.number=sel; GAME.pickIndex++;

  if(pl.isBot){ setTimeout(()=>{ p.number=sel; GAME.pickIndex++; if(GAME.pickIndex>=GAME.players.length){closeSheet();renderGameScreen();}else openKillerPick(); },700); }
  showSheet();
}

function bobThrow(hit){

function checkoutThrow(v,m){
  const cur=curP(); if(GAME.darts.length>=3||GAME.turnAdvancing) return;
  pushHistory(); GAME.darts.push({v,m});
  const used=GAME.darts.reduce((a,d)=>a+d.v*d.m,0);
  const rem=cur.coTarget-used; const isDouble=(m===2)||(v===25&&m===2);
  let done=false,hit=false;
  if(rem===0 && isDouble){ done=true; hit=true; }
  else if(rem<0 || rem===1 || (rem===0 && !isDouble)){ done=true; }   // bust = miss
  else if(GAME.darts.length>=3){ done=true; }                          // 3 darts, no finish = miss
  if(done){ endAttempt(hit); return; }
  Sound.hit(); renderGameScreen();
}
function endAttempt(hit){
  const cur=curP(); cur.attempts++; if(hit){ cur.hits++; Sound.finish(); Sound.say('Checkout'); } else { vibrate(80); }
  GAME.coResult=hit?'hit':'miss'; GAME.turnAdvancing=true; renderGameScreen();
  setTimeout(()=>{ if(GAME){ GAME.turnAdvancing=false; checkoutNext(); } }, hit?1000:750);
}
function checkoutNext(){
  if(!GAME) return;
  GAME.coResult=null; GAME.darts=[]; GAME.mult=1;
  if(GAME.players.every(p=>p.attempts>=GAME.coAttempts)){
    let best=-1,wi=0; GAME.players.forEach((p,i)=>{ if(p.hits>best){best=p.hits;wi=i;} });

  }
  let g=0; do{ GAME.cur=(GAME.cur+1)%GAME.players.length; g++; }while(GAME.players[GAME.cur].attempts>=GAME.coAttempts && g<20);
  setCheckoutTarget(curP());

}

/* ---- HALVE IT ---- */
function halveValue(tg,v,m){
  if(tg.t==='n') return v===tg.n ? v*m : 0;
  if(tg.t==='D') return m===2 ? v*m : 0;
  if(tg.t==='T') return m===3 ? v*m : 0;
  if(tg.t==='B') return v===25 ? v*m : 0;
  return 0;
}
function renderHalveIt(){
  const targets=GAME.targets; const tg=targets[GAME.round-1];
  const isBerm=GAME.type==='bermuda';
  let heads='<div class="cheaders">';
  GAME.players.forEach((p,i)=>{ const pl=getPlayer(p.id);
    heads+=`<div class="chead ${i===GAME.cur?'active':''}"><div class="nm">${pl.name}</div><div class="sc">${p.score}</div></div>`; });
  heads+='</div>';
  const turn=GAME.darts.reduce((a,d)=>a+(d.val||0),0);
  const big=`<div class="bigcard"><div class="lbl">Deze ronde · raak</div><div class="big">${tg.label}</div><div class="hint">${turn>0?('+'+turn+' deze beurt'):'Mis alles = score gehalveerd'}</div></div>`;
  let tiles='<div class="darttiles">';
  for(let i=0;i<3;i++){ const d=GAME.darts[i]; if(d===undefined) tiles+='<div class="dtile">–</div>'; else tiles+=`<div class="dtile ${d.val>0?'hit':'miss'}">${d.val>0?'+'+d.val:dartLabel(d)}</div>`; }
  tiles+='</div>';
  const cols=Math.min(targets.length,6);
  let prog=`<div class="pgrid" style="grid-template-columns:repeat(${cols},1fr)">`;
  targets.forEach((t,i)=>{ const cls=i<GAME.round-1?'hit':(i===GAME.round-1?'cur':''); prog+=`<div class="pcell ${cls}">${t.label.slice(0,3)}</div>`; });
  prog+='</div>';
  return `<div>${ctrlBar(icon(isBerm?'zap':'flame',16)+(isBerm?' Bermuda':' Halve It'),'RONDE '+GAME.round+' VAN '+targets.length)}${heads}${big}${tiles}${prog}${multSeg()}${numpadHTML()}
    <div class="actions"><button class="act-bull" data-bull="1">Bull</button><button class="act-miss" data-miss="1">Miss</button>
    <button class="act-undo" data-act="undo">${icon('undo',16)}</button><button class="act-next" data-act="next" ${GAME.darts.length===0?'disabled':''}>Volgende</button></div></div>`;
}
function halveItThrow(v,m){
  if(GAME.darts.length>=3) return;
  pushHistory();
  const tg=GAME.targets[GAME.round-1];
  GAME.darts.push({v,m,val:halveValue(tg,v,m)});
  if(GAME.darts.length>=3){ renderGameScreen(); if(GAME.auto&&!curIsBot()) setTimeout(nextPlayer,500); return; }
  renderGameScreen();
}

function otherLegs(idx){ let m=0; GAME.players.forEach((p,i)=>{if(i!==idx)m=Math.max(m,p.legsWon);}); return m; }
function chipsForGame(p,pl){

  if(GAME.type==='doubles'||GAME.type==='trebles'){ const pct=p.attempts?Math.round(p.hits/p.attempts*100):0; return `<div class="wchip brass"><div class="v">${p.hits}/${p.attempts}</div><div class="k">${GAME.trainMult===3?'Triples':'Dubbels'}</div></div><div class="wchip green"><div class="v">${pct}%</div><div class="k">Trefkans</div></div>`; }

function recordGameStats(winIdx){
  const winName=getPlayer(GAME.players[winIdx].id).name;
  GAME.players.forEach((gp,i)=>{
    const pl=getPlayer(gp.id); const st=pl.stats; st.games++; if(i===winIdx) st.wins++;
    if(GAME.type==='x01'){
      const scored=STATE.setup.points-(gp.score||0);
      const darts=gp.dartsThrown||(gp.turnScores?gp.turnScores.length*3:0);
      if(darts>0 && scored>0){
        const avg=+(scored/darts*3).toFixed(1);
        st.avgHistory=(st.avgHistory||[]).concat(avg); if(st.avgHistory.length>10) st.avgHistory=st.avgHistory.slice(-10);
        st.avg=+(st.avgHistory.reduce((a,b)=>a+b,0)/st.avgHistory.length).toFixed(1);
        st.dartsPerLeg=+((((st.dartsPerLeg||darts)*(st.games-1))+darts)/st.games).toFixed(1);
      }
    }
  });
  let detail='';
  if(GAME.type==='x01') detail=STATE.setup.points+' · '+GAME.players[winIdx].setsWon+'–'+otherSets(winIdx)+' in sets';
  else if(GAME.type==='cricket') detail='Cricket';
  else if(GAME.type==='shanghai') detail=GAME.players[winIdx].points+' punten';
  else if(GAME.type==='bob') detail='saldo '+GAME.players[winIdx].balance;
  else if(GAME.type==='atc') detail='Around the Clock';
  else if(GAME.type==='killer') detail='Killer';
  else if(GAME.type==='countup') detail=GAME.players[winIdx].score+' punten';
  else if(GAME.type==='halveit'||GAME.type==='bermuda') detail=GAME.players[winIdx].score+' punten';
  else if(GAME.type==='doubles'||GAME.type==='trebles') detail=GAME.players[winIdx].hits+'/'+GAME.trainSeq.length+(GAME.trainMult===3?' triples':' dubbels');
  else if(GAME.type==='golf') detail=GAME.players[winIdx].total+' slagen';
  else if(GAME.type==='gotcha') detail='doel '+GAME.target;
  else if(GAME.type==='cotrain') detail=GAME.players[winIdx].hits+'/'+GAME.players[winIdx].attempts+' checkouts';
  STATE.history=(STATE.history||[]);
  STATE.history.unshift({ date:Date.now(), type:GAME.type, winner:winName,
    players:GAME.players.map(p=>getPlayer(p.id).name), detail });
  if(STATE.history.length>50) STATE.history.length=50;
  save();
}

/* ============ TOURNAMENT ============ */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function startTourney(ids){
  if(STATE.tourney && STATE.tourney.active){ showTourneyBoard(); return; }
  if(ids.length<3){ toast('Kies minstens 3 spelers'); return; }
  const s=STATE.setup;
  const t={ active:true, format:s.tourFormat, legs:s.tourLegs, points:s.tourPoints,
    ids:ids.slice(), champion:null, cur:null };
  if(t.format==='ko'){ t.bracket=buildKO(shuffle(ids)); koResolveByes(t); }
  else { t.fixtures=buildRR(shuffle(ids)); }
  STATE.tourney=t; save();
  showTourneyBoard();
}
function buildKO(ids){
  let n=1; while(n<ids.length) n*=2;
  const slots=ids.slice(); while(slots.length<n) slots.push(null);
  const rounds=[]; let round=[];
  for(let i=0;i<slots.length;i+=2) round.push({a:slots[i],b:slots[i+1],wa:0,wb:0,winner:undefined});
  rounds.push(round);
  let cnt=round.length;
  while(cnt>1){ cnt=Math.floor(cnt/2); const r=[]; for(let i=0;i<cnt;i++) r.push({a:undefined,b:undefined,wa:0,wb:0,winner:undefined}); rounds.push(r); }
  return rounds;
}
function koPropagate(t,r,i,winnerId){
  if(r+1>=t.bracket.length){ t.champion=winnerId; return; }
  const next=t.bracket[r+1][Math.floor(i/2)];
  if(i%2===0) next.a=winnerId; else next.b=winnerId;
}
function koResolveByes(t){
  let changed=true;
  while(changed){ changed=false;
    for(let r=0;r<t.bracket.length;r++) for(let i=0;i<t.bracket[r].length;i++){
      const m=t.bracket[r][i];
      if(m.winner===undefined){
        if(m.a!=null && m.b===null){ m.winner=m.a; m.bye=true; koPropagate(t,r,i,m.a); changed=true; }
        else if(m.b!=null && m.a===null){ m.winner=m.b; m.bye=true; koPropagate(t,r,i,m.b); changed=true; }
      }
    }
  }
}
function koNextMatch(t){
  for(let r=0;r<t.bracket.length;r++) for(let i=0;i<t.bracket[r].length;i++){
    const m=t.bracket[r][i];
    if(m.winner===undefined && m.a!=null && m.b!=null) return {r,i,m};
  }
  return null;
}
function buildRR(ids){ const f=[]; for(let i=0;i<ids.length;i++) for(let j=i+1;j<ids.length;j++) f.push({a:ids[i],b:ids[j],wa:0,wb:0,winner:undefined,played:false}); return f; }
function rrNextMatch(t){ const idx=t.fixtures.findIndex(f=>!f.played); return idx<0?null:{idx,m:t.fixtures[idx]}; }
function rrStandings(t){
  const tbl={}; t.ids.forEach(id=>tbl[id]={id,p:0,w:0,l:0,lf:0,la:0});
  t.fixtures.forEach(f=>{ if(!f.played) return;
    tbl[f.a].p++; tbl[f.b].p++; tbl[f.a].lf+=f.wa; tbl[f.a].la+=f.wb; tbl[f.b].lf+=f.wb; tbl[f.b].la+=f.wa;
    if(f.winner===f.a){tbl[f.a].w++;tbl[f.b].l++;} else {tbl[f.b].w++;tbl[f.a].l++;} });
  return Object.values(tbl).sort((x,y)=> y.w-x.w || (y.lf-y.la)-(x.lf-x.la) || y.lf-x.lf );
}
function tourneyNext(t){ return t.format==='ko'?koNextMatch(t):rrNextMatch(t); }
function startTourneyMatch(){
  const t=STATE.tourney; const nm=tourneyNext(t);
  if(!nm){ showTourneyBoard(); return; }
  t.cur=nm; save();
  const a=nm.m.a, b=nm.m.b;
  GAME={ type:'x01', tourney:true, players:[a,b].map(id=>({id,...freshPlayerGame('x01')})), cur:0, darts:[], mult:1,
    history:[], setsTarget:1, legsTarget:t.legs, auto:STATE.settings.autoContinue, round:1, finished:false };
  GAME.players.forEach(gp=>{ gp.startScore=t.points; gp.score=t.points; });
  GAME.format='firstTo';

}
function tourneyRecordResult(winnerIdx){
  const t=STATE.tourney; if(!t||!t.cur){ showTourneyBoard(); return; }
  const la=GAME.players[0].legsWon, lb=GAME.players[1].legsWon;
  const wId=GAME.players[winnerIdx].id;
  const m=t.cur.m; m.wa=la; m.wb=lb; m.winner=wId;
  if(t.format==='ko'){ m.played=true; koPropagate(t,t.cur.r,t.cur.i,wId); koResolveByes(t);
    if(koNextMatch(t)===null && t.champion==null){ // final done
      const fr=t.bracket[t.bracket.length-1][0]; t.champion=fr.winner; }
  } else { m.played=true; if(rrNextMatch(t)===null){ t.champion=rrStandings(t)[0].id; } }
  t.cur=null; GAME=null; save();
  showTourneyBoard();
}

/* ============ BOT ============ */
const BOT_PROFILES={ makkelijk:{avg:30,acc:.45,doubleAcc:.18}, gemiddeld:{avg:50,acc:.62,doubleAcc:.32}, gevorderd:{avg:75,acc:.80,doubleAcc:.45} };
function maybeBotTurn(){
  if(!GAME||GAME.finished) return;
  if($('#winner').classList.contains('show')) return;
  if($('#scrim').classList.contains('show')) return;
  if(!curIsBot()) return;
  const pl=getPlayer(curP().id); const prof=BOT_PROFILES[pl.botLevel||'gevorderd'];
  setTimeout(()=>botThrowOne(prof),700);
}
function botThrowOne(prof){
  if(!GAME||GAME.finished||!curIsBot()) return;
  const t=GAME.type;
  if(t==='x01'){
    const cur=curP(); const rem=cur.score-turnSum();
    if(STATE.setup.checkIn==='double' && !cur.checkedIn){
      // must check in on a double first
      if(Math.random()<prof.doubleAcc) x01Dart(20,2); else x01Dart([1,5,7,12][Math.floor(Math.random()*4)],1);
    } else if(rem<=170 && checkoutRoute(rem) && Math.random()<prof.doubleAcc){
      // attempt finish: hit the route's first dart value as the remaining
      const route=checkoutRoute(rem).split(' '); const first=route[0];
      const {v,m}=parseDart(first); x01Dart(v,m);
    } else {
      const hit=botScoreDart(prof);
      x01Dart(hit.v,hit.m);
    }
  } else if(t==='cricket'){
    const cur=curP(); const open=CRICK_NUMS.find(n=>cur.marks[n]<3)||20;
    const m=Math.random()<prof.acc?(Math.random()<prof.doubleAcc?3:1):1;
    cricketHit(open, Math.random()<prof.acc?m:1);
  } else if(t==='atc'){ atcThrow(Math.random()<prof.acc?1:0); }
  else if(t==='shanghai'){ const m=Math.random()<prof.acc?(1+Math.floor(Math.random()*3)):0; shanghaiThrow(m); }
  else if(t==='bob'){ bobThrow(Math.random()<prof.doubleAcc?1:0); }
  else if(t==='killer'){
    const cur=curP();
    if(!cur.isKiller){ killerHit(cur.number); } // try own (double handled by mult; force double sometimes)
    else { const victim=GAME.players.find(p=>!p.eliminated&&p!==cur); GAME.mult=1; killerHit(victim?victim.number:cur.number); }
  }
  else if(t==='countup'){ const hit=botScoreDart(prof); countUpDart(hit.v,hit.m); }
  else if(t==='cotrain'){
    const cur=curP(); const used=GAME.darts.reduce((a,d)=>a+d.v*d.m,0); const rem=cur.coTarget-used;
    const r=bestRoute(rem,3-GAME.darts.length);
    if(r && Math.random()<prof.doubleAcc){ const {v,m}=parseDart(r.split(' ')[0]); checkoutThrow(v,m); }
    else checkoutThrow([1,5,20,19][Math.floor(Math.random()*4)],1);
  }
  else if(t==='halveit'||t==='bermuda'){
    const tg=GAME.targets[GAME.round-1]; let v=20,m=1;
    if(Math.random()<prof.acc){ if(tg.t==='n'){v=tg.n;m=1;} else if(tg.t==='D'){v=16;m=2;} else if(tg.t==='T'){v=20;m=3;} else {v=25;m=2;} }
    else { v=[1,5,7,9,12][Math.floor(Math.random()*5)]; m=1; }
    halveItThrow(v,m);
  }
  else if(t==='doubles'||t==='trebles'){
    const n=GAME.trainSeq[curP().seq];
    if(Math.random()<prof.doubleAcc) doublesThrow(n,GAME.trainMult); else doublesThrow([1,5,7,12][Math.floor(Math.random()*4)],1);
  }
  else if(t==='golf'){
    const r=Math.random(); golfThrow(r<prof.doubleAcc?1:r<prof.acc?2:r<0.85?3:5);
  }
  else if(t==='gotcha'){
    const cur=curP(); const need=GAME.target-cur.score-turnSum();
    if(need>0 && need<=60 && Math.random()<prof.acc){ const v=Math.min(20,need); gotchaDart(v<=20?v:20, 1); }
    else { const hit=botScoreDart(prof); gotchaDart(hit.v,hit.m); }
  }
  // continue bot turn (skip if a turn transition is already pending, e.g. after a bust)
  if(GAME && !GAME.finished && !GAME.turnAdvancing && curIsBot() && GAME.darts.length>0 && GAME.darts.length<3 && !$('#winner').classList.contains('show')){
    setTimeout(()=>botThrowOne(prof),650);
  } else if(GAME && !GAME.finished && !GAME.turnAdvancing && curIsBot() && (GAME.darts.length>=3||GAME.darts.length===0) && !$('#winner').classList.contains('show')){
    setTimeout(()=>{ if(GAME&&!GAME.finished&&!GAME.turnAdvancing&&curIsBot()) nextPlayer(); },650);
  }
}
function botScoreDart(prof){
  if(Math.random()<prof.acc){
    const targets=prof.avg>60?[{v:20,m:3},{v:20,m:1},{v:19,m:3}]:prof.avg>40?[{v:20,m:1},{v:19,m:1},{v:20,m:3}]:[{v:20,m:1},{v:5,m:1},{v:1,m:1}];
    return targets[Math.floor(Math.random()*targets.length)];
  }
  // miss-ish: low single
  const lows=[1,5,9,12,7,3]; return {v:lows[Math.floor(Math.random()*lows.length)],m:1};
}
function parseDart(s){ if(s==='Bull')return{v:25,m:2}; if(s==='25')return{v:25,m:1}; const m=s[0]==='T'?3:s[0]==='D'?2:1; const v=parseInt(s.replace(/[TDS]/,''),10); return {v,m}; }

/* ============ GAME EVENT BINDING ============ */
function flashKey(el,cb){ if(el) el.classList.add('tapped'); setTimeout(cb,100); }
function bindGame(){
  const b=$('#game-body');
  b.querySelectorAll('[data-num]').forEach(el=>el.onclick=()=>{ if(curIsBot())return; const n=+el.dataset.num; const m=GAME.mult; GAME.mult=1; flashKey(el,()=>scoreDart(n,m)); });
  b.querySelectorAll('[data-mult]').forEach(el=>el.onclick=()=>{ GAME.mult=GAME.mult==el.dataset.mult?1:+el.dataset.mult; renderGameScreen(); });
  b.querySelectorAll('[data-bull]').forEach(el=>el.onclick=()=>{ if(curIsBot())return; const m=GAME.mult===2?2:1; GAME.mult=1; flashKey(el,()=>scoreDart(25,m)); });
  b.querySelectorAll('[data-miss]').forEach(el=>el.onclick=()=>{ if(curIsBot())return; flashKey(el,()=>missDart()); });
  b.querySelectorAll('[data-cnum]').forEach(el=>el.onclick=()=>{ if(curIsBot())return; const cn=+el.dataset.cnum; const m=GAME.mult;GAME.mult=1; flashKey(el,()=>cricketHit(cn,m)); });
  b.querySelectorAll('[data-atc]').forEach(el=>el.onclick=()=>{ if(curIsBot())return; atcThrow(+el.dataset.atc); });
  b.querySelectorAll('[data-bob]').forEach(el=>el.onclick=()=>{ if(curIsBot())return; bobThrow(+el.dataset.bob); });
  b.querySelectorAll('[data-dbl]').forEach(el=>el.onclick=()=>{ if(curIsBot())return; doublesHit(+el.dataset.dbl); });
  b.querySelectorAll('[data-golf]').forEach(el=>el.onclick=()=>{ if(curIsBot())return; golfThrow(+el.dataset.golf); });
  b.querySelectorAll('[data-smult]').forEach(el=>el.onclick=()=>{ if(curIsBot())return; const sm=+el.dataset.smult; flashKey(el,()=>shanghaiThrow(sm)); });
  b.querySelectorAll('[data-act]').forEach(el=>el.onclick=()=>handleAct(el.dataset.act));
  // killer number keys (keep mult for double)
  if(GAME.type==='killer'){
    b.querySelectorAll('[data-knum]').forEach(el=>el.onclick=()=>{ if(curIsBot())return; const kn=+el.dataset.knum; flashKey(el,()=>{ killerHit(kn); GAME.mult=1; }); });
  }
}
function scoreDart(v,m){
  if(GAME.type==='countup') countUpDart(v,m);
  else if(GAME.type==='halveit'||GAME.type==='bermuda') halveItThrow(v,m);
  else if(GAME.type==='cotrain') checkoutThrow(v,m);
  else if(GAME.type==='gotcha') gotchaDart(v,m);
  else x01Dart(v,m);
}
function missDart(){
  GAME.mult=1;
  if(GAME.type==='countup'){ countUpDart(0,1); return; }
  if(GAME.type==='halveit'||GAME.type==='bermuda'){ halveItThrow(0,1); return; }
  if(GAME.type==='cotrain'){ checkoutThrow(0,1); return; }
  if(GAME.type==='gotcha'){ gotchaDart(0,1); return; }
  if(GAME.type==='cricket'||GAME.type==='killer'||GAME.type==='shanghai'){ pushHistory(); GAME.darts.push({v:0,m:0,miss:true}); if(GAME.darts.length>=3){renderGameScreen(); if(GAME.auto&&!curIsBot())setTimeout(nextPlayer,400);return;} renderGameScreen(); return; }
  x01Dart(0,1);
}
function openGameSettings(){
  const sh=$('#sheet'); const s=STATE.settings;
  sh.innerHTML=`<div class="handle"></div><h2>${icon('settings',22)} Snelle instellingen</h2>
    <div class="sh-sub">Aanpassen zonder het spel te verlaten</div>
    <div class="group" id="gs"></div>
    <button class="btn btn-primary" id="gsClose" style="margin-top:14px">Terug naar spel</button>`;
  const g=sh.querySelector('#gs');
  [['sound','volume','Geluid'],['autoContinue','play','Auto doorgaan'],['vibrate','vibrate','Trillen bij bust']].forEach(([key,ic,label])=>{
    const r=el('div','setrow'); r.innerHTML=`<div class="l">${icon(ic,18)} ${label}</div>`;
    const t=el('div',s[key]?'toggle on':'toggle');
    t.onclick=()=>{ s[key]=!s[key]; save(); t.classList.toggle('on'); if(key==='autoContinue'&&GAME){ GAME.auto=s.autoContinue; renderGameScreen(); } };
    r.appendChild(t); g.appendChild(r);
  });
  sh.querySelector('#gsClose').onclick=closeSheet;
  showSheet();
}
function openPremiumSheet(){
  const sh=$('#sheet');
  const proModes=Object.keys(MODES).filter(k=>MODES[k].premium).map(k=>MODES[k].t);
  sh.innerHTML=`<div class="handle"></div><h2><span style="color:var(--brass)">${icon('sparkles',22)}</span> OCHE Pro</h2>
    <div class="sh-sub">Ontgrendel extra spelmodi en functies</div>
    <div class="group" style="padding:14px 16px">
      <div style="font-weight:700;margin-bottom:8px">Inbegrepen</div>
      <div style="font-size:14px;color:var(--txt2);line-height:1.9">
        ${proModes.map(t=>'✓ '+t).join('<br>')}<br>✓ Toekomstige Pro-modi
      </div>
    </div>
    <button class="btn btn-primary" id="proBuy" style="margin-top:14px">Ontgrendel OCHE Pro</button>
    <button class="btn btn-ghost" id="proRestore" style="margin-top:10px">Aankoop herstellen</button>
    <div style="font-size:11px;color:var(--dim);text-align:center;margin-top:10px">Eenmalige aankoop · alles blijft lokaal</div>`;
  sh.querySelector('#proBuy').onclick=()=>{ STATE.settings.premium=true; save(); closeSheet(); toast('OCHE Pro ontgrendeld'); if(activeTab==='modus')renderModus(); else renderSettings(); };
  sh.querySelector('#proRestore').onclick=()=>{ STATE.settings.premium=true; save(); closeSheet(); toast('Aankoop hersteld'); if(activeTab==='modus')renderModus(); else renderSettings(); };
  showSheet();
}
function handleAct(act){
  if(act==='undo') undo();
  else if(act==='next'){ if(GAME.type==='cotrain') checkoutSkip(); else if(GAME.type==='doubles'){ if(!GAME.turnAdvancing) doublesResolve(false); } else nextPlayer(); }
  else if(act==='toggleAuto'){ GAME.auto=!GAME.auto; renderGameScreen(); }
  else if(act==='stop'){
    if(GAME.tourney){ if(confirm('Wedstrijd stoppen? Je kunt deze opnieuw starten vanuit het overzicht.')){ GAME=null; showTourneyBoard(); } }
    else if(confirm('Spel stoppen?')){ GAME=null; showTab('spel'); }
  }
  else if(act==='gameSettings'){ openGameSettings(); }
}

/* ============ INIT ============ */
applyTheme(STATE.settings.theme||'oche');
$('#startBtn').onclick=startGame;
$('#startModeBtn').onclick=startGame;
document.querySelectorAll('#tabbar [data-ic]').forEach(b=>{ b.querySelector('.ti').innerHTML=icon(b.dataset.ic,23); });
$('#chartsBtn').innerHTML=icon('chart',18)+' Bekijk grafieken';
showTab('spel');
save();

/* unlock audio on first user interaction (iOS requires a gesture) */
['pointerdown','touchend','click'].forEach(ev=>document.addEventListener(ev,()=>Sound.unlock(),{once:true}));

/* keep screen awake */
if(STATE.settings.keepScreen && 'wakeLock' in navigator){ navigator.wakeLock.request('screen').catch(()=>{}); }

/* service worker: offline support + auto-update (network-first) */
if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }
</script>
